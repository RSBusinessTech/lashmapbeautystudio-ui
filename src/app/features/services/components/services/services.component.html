<section class="services-section">
  <div class="container">
    <div class="services-header">
      <h2 class="section-title">OUR SERVICES</h2>
      <input type="text" [(ngModel)]="searchTerm" class="search-bar" placeholder="Search a service… 🔍" />
    </div>

    <div class="services-container">
      <div class="category" *ngFor="let category of getFilteredCategories(); let cIndex = index" [id]="formatId(category.category)">
        <h3 class="category-title">{{ category.category }}</h3>

        <div class="services-grid">
          <div class="service-card" *ngFor="let service of category.services; let sIndex = index">
            <div class="image-wrapper">
              <img [src]="service.image" [alt]="service.name" />
            </div>

            <div class="service-info">
              <h4>{{ service.name }}</h4>
              <p>{{ isExpanded(cIndex, sIndex) ? service.detailedDescription : service.description }}</p>
              <!-- <small>{{ service.duration }}</small> -->
              <div class="cta-links">
                <a href="https://www.fresha.com/a/lashmap-beauty-studio-melbourne-level-10-1-elizabeth-st-jj0y3knw" class="book-btn" target="_blank">Book Now</a>
                <button class="read-more" (click)="toggleDescription(cIndex, sIndex, category.category)">
                  {{ isExpanded(cIndex, sIndex) ? 'Show Less' : 'Read More' }}
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
